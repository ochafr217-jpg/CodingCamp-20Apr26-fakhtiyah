<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List Life Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Life Dashboard</h1>
      <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </header>

    <main>
      <!-- Greeting Display Component -->
      <section id="greeting-section">
        <div id="time-display"></div>
        <div id="date-display"></div>
        <div id="greeting-message"></div>
        <div id="name-input-container">
          <input type="text" id="name-input" placeholder="Enter your name...">
          <button id="save-name-btn">Save Name</button>
        </div>
      </section>

      <!-- Focus Timer Component -->
      <section id="timer-section">
        <h2>Focus Timer</h2>
        <div id="timer-duration-container">
          <label for="timer-duration">Duration (minutes):</label>
          <input type="number" id="timer-duration" min="1" value="25">
        </div>
        <div id="timer-display">25:00</div>
        <div id="timer-controls">
          <button id="timer-start">Start</button>
          <button id="timer-stop">Stop</button>
          <button id="timer-reset">Reset</button>
        </div>
      </section>

      <!-- Task List Component -->
      <section id="task-section">
        <h2>Tasks</h2>
        <form id="task-form">
          <input type="text" id="task-input" placeholder="Add a new task..." required>
          <button type="submit">Add</button>
        </form>
        <div id="task-sort-container">
          <label for="task-sort">Sort by:</label>
          <select id="task-sort">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="completed">Completed First</option>
            <option value="pending">Pending First</option>
          </select>
        </div>
        <ul id="task-list">
          <!-- Task items will be rendered here -->
        </ul>
      </section>

      <!-- Quick Links Component -->
      <section id="links-section">
        <h2>Quick Links</h2>
        <form id="link-form">
          <input type="text" id="link-label" placeholder="Label" required>
          <input type="url" id="link-url" placeholder="URL" required>
          <button type="submit">Add Link</button>
        </form>
        <div id="links-container">
          <!-- Link buttons will be rendered here -->
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
